<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <filter id="ds" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0c0a06" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdbf94"/><stop offset="1" stop-color="#9a8a5a"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f6e6a8"/><stop offset="1" stop-color="#f6e6a800"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="60" r="56" fill="url(#halo)"/>
  <g filter="url(#ds)" stroke="#efe2c4" stroke-width="3.5" stroke-linejoin="round">
    <!-- wings -->
    <path d="M86 96 Q20 70 8 120 Q40 110 86 140 Z" fill="#d8cba0"/>
    <path d="M114 96 Q180 70 192 120 Q160 110 114 140 Z" fill="#d8cba0"/>
