  </g>
  <g stroke="#9a8a5a" stroke-width="2" fill="none" opacity="0.55">
    <path d="M100 92 L100 224"/><path d="M40 116 Q60 118 86 130"/><path d="M160 116 Q140 118 114 130"/>
